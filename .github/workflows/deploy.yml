name: CI/CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    env:
      APP_DIR: ${{ vars.EC2_APP_DIR }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      S3_DEPLOY_BUCKET: ${{ vars.S3_DEPLOY_BUCKET }}
      ARTIFACT_KEY: deploy/api-vagas-${{ github.sha }}.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: find . -path ./node_modules -prune -o -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Build deployment archive
        run: |
          tar \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude=".env" \
            -czf "$RUNNER_TEMP/api-vagas.tar.gz" .

      - name: Authenticate to AWS with OIDC
        id: aws-auth
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload archive to private S3 bucket
        run: aws s3 cp "$RUNNER_TEMP/api-vagas.tar.gz" "s3://$S3_DEPLOY_BUCKET/$ARTIFACT_KEY"

      - name: Deploy through AWS Systems Manager
        run: |
          artifact_uri="s3://$S3_DEPLOY_BUCKET/$ARTIFACT_KEY"
          parameters=$(jq -n \
            --arg artifact_uri "$artifact_uri" \
            --arg app_dir "$APP_DIR" \
            '{commands: [
              "set -euo pipefail",
              "aws s3 cp \($artifact_uri) /tmp/api-vagas.tar.gz",
              "mkdir -p \($app_dir)",
              "tar -xzf /tmp/api-vagas.tar.gz -C \($app_dir)",
              "chown -R ec2-user:ec2-user \($app_dir)",
              ("sudo -u ec2-user -H bash -lc " + (("cd " + $app_dir + " && npm ci --omit=dev && if pm2 describe api-vagas >/dev/null 2>&1; then pm2 restart api-vagas --update-env; else pm2 start index.js --name api-vagas; fi && pm2 save") | @sh))
            ]}')

          command_id=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy api-vagas $GITHUB_SHA" \
            --parameters "$parameters" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command: $command_id"
          status="Pending"
          for attempt in {1..60}; do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)

            case "$status" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac

            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}'

          test "$status" = "Success"

      - name: Remove deployment archive from S3
        if: always() && steps.aws-auth.outcome == 'success'
        run: aws s3 rm "s3://$S3_DEPLOY_BUCKET/$ARTIFACT_KEY"
